<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando Sistema de Gestión...</title>
    
    <!-- Este script intenta la redirección de 3 formas distintas -->
    <script type="text/javascript">
        var urlApp = "https://script.google.com/macros/s/AKfycby-ek43fVLSelgO0IqhHbw2TfM5BKTi17Tzf-zvuN_HMfuUPi2JpIwS9RbyLXlgtgkcBA/exec";

        // Método 1: Redirección inmediata (Recomendado para móviles)
        window.location.replace(urlApp);

        // Método 2: Respaldo si el anterior falla
        setTimeout(function() {
            window.location.href = urlApp;
        }, 1000);
    </script>

    <style>
        body { 
            background: #f1f5f9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            text-align: center;
        }
        .container { padding: 20px; }
        .loader { 
            border: 5px solid #e2e8f0; border-top: 5px solid #3b82f6; 
            border-radius: 50%; width: 50px; height: 50px; 
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-manual {
            display: inline-block; padding: 12px 24px; background: #3b82f6;
            color: white; text-decoration: none; border-radius: 8px;
            font-weight: bold; margin-top: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h2 style="color: #1e293b;">Entrando al Sistema</h2>
        <p style="color: #64748b;">Si no eres redirigido en 2 segundos, presiona el botón:</p>
        
        <!-- Botón de respaldo (Fallback) -->
        <a href="https://script.google.com/macros/s/AKfycby-ek43fVLSelgO0IqhHbw2TfM5BKTi17Tzf-zvuN_HMfuUPi2JpIwS9RbyLXlgtgkcBA/exec" class="btn-manual">
            ABRIR SISTEMA MANUALMENTE
        </a>
    </div>
</body>
</html>
